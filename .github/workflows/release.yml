name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    name: Build Release Artifacts
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: ado-linux-amd64
            arch: amd64
          - os: ubuntu-latest
            artifact_name: ado-linux-arm64
            arch: arm64
          - os: macos-14
            artifact_name: ado-macos-arm64
            arch: arm64

    steps:
    - uses: actions/checkout@v4

    - name: Install cross-compiler
      if: matrix.artifact_name == 'ado-linux-arm64'
      run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

    - name: Build
      run: |
        if [ "${{ matrix.artifact_name }}" = "ado-linux-arm64" ]; then
          make CC=aarch64-linux-gnu-gcc
        else
          make
        fi

    - name: Prepare Artifact
      run: |
        mkdir -p dist
        cp doc dist/${{ matrix.artifact_name }}

    - name: Install fpm
      if: runner.os == 'Linux'
      run: sudo gem install fpm

    - name: Build Packages
      if: runner.os == 'Linux'
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        if [ -z "$VERSION" ] || [[ "$VERSION" == refs/* ]]; then
          VERSION="0.1.0" # fallback for testing
        fi

        # Package DEB
        fpm -s dir -t deb -n ado -v $VERSION -a ${{ matrix.arch }} \
          --description "Ado - A Minimal Programming Language" \
          --url "https://github.com/${{ github.repository }}" \
          --maintainer "Ado Contributors" \
          --prefix /usr/local/bin \
          doc=/usr/local/bin/ado

        # Package RPM
        fpm -s dir -t rpm -n ado -v $VERSION -a ${{ matrix.arch }} \
          --description "Ado - A Minimal Programming Language" \
          --url "https://github.com/${{ github.repository }}" \
          --maintainer "Ado Contributors" \
          --prefix /usr/local/bin \
          doc=/usr/local/bin/ado

        mv *.deb *.rpm dist/ 2>/dev/null || true

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/

  create-release:
    name: Create Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/ado-linux-amd64/ado-linux-amd64
          artifacts/ado-linux-amd64/*.deb
          artifacts/ado-linux-amd64/*.rpm
          artifacts/ado-linux-arm64/ado-linux-arm64
          artifacts/ado-linux-arm64/*.deb
          artifacts/ado-linux-arm64/*.rpm
          artifacts/ado-macos-arm64/ado-macos-arm64
        generate_release_notes: true

  update-homebrew:
    name: Update Homebrew Formula
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0

    - name: Update Formula
      run: |
        TAG_NAME=${GITHUB_REF#refs/tags/}
        URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG_NAME}.tar.gz"

        # Download the source tarball to calculate sha256
        curl -sL $URL -o source.tar.gz
        SHA256=$(sha256sum source.tar.gz | awk '{ print $1 }')

        # Update the formula
        sed -i "s|url \".*\"|url \"$URL\"|" HomebrewFormula/ado.rb
        sed -i "s|sha256 \".*\"|sha256 \"$SHA256\"|" HomebrewFormula/ado.rb
        sed -i "s|homepage \".*\"|homepage \"https://github.com/${{ github.repository }}\"|" HomebrewFormula/ado.rb

        # Commit and push
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add HomebrewFormula/ado.rb
        git commit -m "Update Homebrew formula for ${TAG_NAME}" || echo "No changes to commit"
        git push origin main
