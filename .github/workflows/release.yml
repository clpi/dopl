name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    name: Build Release Artifacts
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            artifact_name: ado-linux-amd64
          - os: ubuntu-latest
            arch: arm64
            artifact_name: ado-linux-arm64
          - os: macos-14
            arch: arm64
            artifact_name: ado-macos-arm64

    steps:
    - uses: actions/checkout@v4

    - name: Setup cross-compiler
      if: matrix.os == 'ubuntu-latest' && matrix.arch == 'arm64'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu

    - name: Setup Ruby
      if: matrix.os == 'ubuntu-latest'
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'

    - name: Setup fpm
      if: matrix.os == 'ubuntu-latest'
      run: gem install fpm

    - name: Build (Linux AMD64 / macOS)
      if: matrix.arch != 'arm64' || matrix.os != 'ubuntu-latest'
      run: make

    - name: Build (Linux ARM64)
      if: matrix.os == 'ubuntu-latest' && matrix.arch == 'arm64'
      run: make CC=aarch64-linux-gnu-gcc

    - name: Prepare Artifact
      run: |
        mkdir -p dist
        cp doc dist/${{ matrix.artifact_name }}
        tar -czf dist/${{ matrix.artifact_name }}.tar.gz -C dist ${{ matrix.artifact_name }}

    - name: Package with FPM
      if: matrix.os == 'ubuntu-latest'
      run: |
        if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}
        else
          VERSION="0.0.0" # Fallback for local/branch builds
        fi
        fpm -s dir -t deb -n ado -v $VERSION -a ${{ matrix.arch }} --prefix /usr/local/bin doc=ado
        fpm -s dir -t rpm -n ado -v $VERSION -a ${{ matrix.arch }} --prefix /usr/local/bin doc=ado
        mv ado*.deb dist/ || true
        mv ado*.rpm dist/ || true

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/*

  create-release:
    name: Create Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/ado-linux-amd64/ado-linux-amd64
          artifacts/ado-linux-amd64/ado-linux-amd64.tar.gz
          artifacts/ado-linux-amd64/*.deb
          artifacts/ado-linux-amd64/*.rpm
          artifacts/ado-linux-arm64/ado-linux-arm64
          artifacts/ado-linux-arm64/ado-linux-arm64.tar.gz
          artifacts/ado-linux-arm64/*.deb
          artifacts/ado-linux-arm64/*.rpm
          artifacts/ado-macos-arm64/ado-macos-arm64
          artifacts/ado-macos-arm64/ado-macos-arm64.tar.gz
        generate_release_notes: true

  update-homebrew:
    name: Update Homebrew Formula
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0

    - name: Update Formula
      run: |
        TAG_NAME=${GITHUB_REF#refs/tags/}
        URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG_NAME}.tar.gz"

        # Download the source tarball to calculate sha256
        URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG_NAME}.tar.gz"
        curl -sL $URL -o source.tar.gz
        SHA256=$(sha256sum source.tar.gz | awk '{ print $1 }')

        # Update the formula
        sed -i "s|url \".*\"|url \"$URL\"|" HomebrewFormula/ado.rb
        sed -i "s|sha256 \".*\"|sha256 \"$SHA256\"|" HomebrewFormula/ado.rb
        sed -i "s|homepage \".*\"|homepage \"https://github.com/${{ github.repository }}\"|" HomebrewFormula/ado.rb

        # Commit and push
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add HomebrewFormula/ado.rb
        git commit -m "Update Homebrew formula for ${TAG_NAME}" || echo "No changes to commit"
        git push origin main
