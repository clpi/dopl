name: CI/CD

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Lint workflows and scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: actionlint
        run: |
          bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color
      - name: shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck *.sh

  build-and-test:
    name: Build, Test, and Package
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
            artifact_name: ado-linux-amd64
          - os: ubuntu-latest
            target: aarch64-linux
            artifact_name: ado-linux-arm64
          - os: macos-13
            target: x86_64-darwin
            artifact_name: ado-macos-amd64
          - os: macos-14
            target: aarch64-darwin
            artifact_name: ado-macos-arm64

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y ruby ruby-dev rubygems gcc make rpm libarchive-tools zstd
        sudo gem install fpm

    - name: Install cross-compiler (Linux aarch64)
      if: matrix.target == 'aarch64-linux'
      run: |
        sudo apt-get install -y gcc-aarch64-linux-gnu

    - name: Build
      run: |
        if [ "${{ matrix.target }}" = "aarch64-linux" ]; then
          make CC=aarch64-linux-gnu-gcc
        else
          make
        fi

    - name: Test
      if: matrix.target != 'aarch64-linux'
      run: make test

    - name: Prepare Artifact
      run: |
        mkdir -p dist
        cp doc ado
        tar -czf dist/${{ matrix.artifact_name }}.tar.gz ado

    - name: Generate packages (Linux)
      if: runner.os == 'Linux'
      run: |
        mkdir -p tmp_install
        if [ "${{ matrix.target }}" = "aarch64-linux" ]; then
          make CC=aarch64-linux-gnu-gcc DESTDIR=./tmp_install PREFIX=/usr install
        else
          make DESTDIR=./tmp_install PREFIX=/usr install
        fi
        VERSION=${GITHUB_REF#refs/tags/v}
        if [ -z "$VERSION" ] || [ "$VERSION" = "${GITHUB_REF}" ]; then
          VERSION="1.0.0" # Fallback if not triggered by tag
        fi
        ARCH="amd64"
        RPM_ARCH="x86_64"
        if [ "${{ matrix.target }}" = "aarch64-linux" ]; then
          ARCH="arm64"
          RPM_ARCH="aarch64"
        fi

        fpm -s dir -t deb -n ado -v $VERSION -a $ARCH -C ./tmp_install .
        fpm -s dir -t rpm -n ado -v $VERSION -a $RPM_ARCH -C ./tmp_install .
        fpm -s dir -t apk -n ado -v $VERSION -a $ARCH -C ./tmp_install .
        fpm -s dir -t pacman -n ado -v $VERSION -a $RPM_ARCH -C ./tmp_install .
        ls -la *.deb *.rpm *.apk *.pkg.tar.zst
        mv *.deb dist/
        mv *.rpm dist/
        mv *.apk dist/
        mv *.pkg.tar.zst dist/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/*

    - name: Check Nix flake
      if: matrix.target == 'x86_64-linux'
      uses: DeterminateSystems/nix-installer-action@main

    - name: Check Nix flake (run)
      if: matrix.target == 'x86_64-linux'
      run: nix flake check

  create-release:
    name: Create Release
    needs: build-and-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/ado-linux-amd64/*
          artifacts/ado-linux-arm64/*
          artifacts/ado-macos-amd64/*
          artifacts/ado-macos-arm64/*
        generate_release_notes: true

  update-manifests:
    name: Update Package Manifests
    needs: create-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0

    - name: Update Manifests
      run: |
        TAG_NAME=${GITHUB_REF#refs/tags/}
        URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG_NAME}.tar.gz"
        VERSION=${GITHUB_REF#refs/tags/v}

        # Download the source tarball to calculate sha256
        curl -sL $URL -o source.tar.gz
        SHA256=$(sha256sum source.tar.gz | awk '{ print $1 }')

        # Update the Homebrew formula
        sed -i "s|url \".*\"|url \"$URL\"|" HomebrewFormula/ado.rb
        sed -i "s|sha256 \".*\"|sha256 \"$SHA256\"|" HomebrewFormula/ado.rb
        sed -i "s|homepage \".*\"|homepage \"https://github.com/${{ github.repository }}\"|" HomebrewFormula/ado.rb

        # Update flake.nix version
        if [ -n "$VERSION" ] && [ "$VERSION" != "${GITHUB_REF}" ]; then
          sed -i "s|version = \".*\";|version = \"$VERSION\";|" flake.nix
        fi

        # Commit and push
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add HomebrewFormula/ado.rb flake.nix
        git commit -m "Update manifests for ${TAG_NAME}" || echo "No changes to commit"
        git push origin main
